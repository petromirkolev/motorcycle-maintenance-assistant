services:
  postgres:
    image: postgres:16
    container_name: motocare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: motocare_dev
    ports:
      - '5432:5432'
    volumes:
      - motocare_postgres_data:/var/lib/postgresql/data

  api:
    build: ./api
    container_name: motocare-maintenance-api
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/motocare_dev
      PORT: 3001
      NODE_ENV: development
    depends_on:
      - postgres

  web:
    build: ./web
    container_name: motocare-maintenance-web
    ports:
      - '4173:4173'
    depends_on:
      - api

volumes:
  motocare_postgres_data:
